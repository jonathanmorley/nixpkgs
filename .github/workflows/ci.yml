name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FORMATTER_CLIENT_ID: op://GitHub Actions/Formatter/username
          FORMATTER_PRIVATE_KEY_BASE64: op://GitHub Actions/Formatter/credential
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: DeterminateSystems/determinate-nix-action@f4c468f2287f0f14a113841b41f2dc8957119519 # v3.19.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Format
        run: nix fmt
      - name: Commit formatting changes
        run: git add -A
      - uses: pgaskin/push-signed-commits@bade5bde4bb6f40056650ba7bd9160bd74335c97 # v1.0.2
        with:
          branch: ${{ github.head_ref }}
          commit-message: "style: auto-format with treefmt"
          app-id: ${{ env.FORMATTER_CLIENT_ID }}
          app-key: ${{ env.FORMATTER_PRIVATE_KEY_BASE64 }}

  nix:
    needs: format
    strategy:
      matrix:
        include:
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
      - uses: DeterminateSystems/determinate-nix-action@f4c468f2287f0f14a113841b41f2dc8957119519 # v3.19.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: jonathanmorley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check
        run: nix flake check --print-build-logs --no-update-lock-file
      - name: Switch
        run: |
          # Remove files that will be replaced by nix-darwin
          sudo rm -f /etc/shells /etc/zshenv /etc/nix/nix.custom.conf
          # Re-inject the GitHub token via NIX_CONFIG since removing nix.custom.conf
          # strips the access-tokens that determinate-nix-action configured
          sudo -i env NIX_CONFIG="extra-access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}" nix run nix-darwin -- switch --flake ${{ github.workspace }}#gha-${{ matrix.system }}
