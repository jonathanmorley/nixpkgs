name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NIX_CACHE_SUBSTITUTERS: https://cache.nixos.org https://nix-community.cachix.org https://jonathanmorley.cachix.org
  NIX_CACHE_TRUSTED_PUBLIC_KEYS: >-
    cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
    jonathanmorley.cachix.org-1:5P5EOY4b+AC2G1XIzjluXmoWBSK6GiMg4UHV4+gCgwI=

jobs:
  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FORMATTER_CLIENT_ID: op://GitHub Actions/Formatter/username
          FORMATTER_PRIVATE_KEY_BASE64: op://GitHub Actions/Formatter/credential
      - name: Decode private key
        id: decode-key
        run: |
          private_key=$(printf '%s' "$FORMATTER_PRIVATE_KEY_BASE64" | base64 -d | awk 'BEGIN {ORS="\\n"} {print}' | head -c -2) &> /dev/null
          echo "::add-mask::$private_key"
          echo "private-key=$private_key" >> "$GITHUB_OUTPUT"
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ env.FORMATTER_CLIENT_ID }}
          private-key: ${{ steps.decode-key.outputs.private-key }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2
        with:
          github-token: ${{ github.token }}
      - name: Set up Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: jonathanmorley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Format
        env:
          NIX_CONFIG: |
            substituters = ${{ env.NIX_CACHE_SUBSTITUTERS }}
            trusted-public-keys = ${{ env.NIX_CACHE_TRUSTED_PUBLIC_KEYS }}
        run: nix fmt
      - name: Commit formatting changes
        run: git add -A
      - uses: pgaskin/push-signed-commits@00d248c5c952d45cc5ae0dc5b4ca0c236aee25a7 # v1.1.1
        with:
          branch: ${{ github.head_ref }}
          commit-message: "style: auto-format with treefmt"
          github-token: ${{ steps.app-token.outputs.token }}

  nix:
    needs: format
    strategy:
      matrix:
        include:
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2
        with:
          github-token: ${{ github.token }}
      - name: Set up Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: jonathanmorley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check
        env:
          NIX_CONFIG: |
            substituters = ${{ env.NIX_CACHE_SUBSTITUTERS }}
            trusted-public-keys = ${{ env.NIX_CACHE_TRUSTED_PUBLIC_KEYS }}
        run: nix flake check --print-build-logs --no-update-lock-file
      - name: Switch
        env:
          NIX_GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Remove files that will be replaced by nix-darwin
          sudo rm -f /etc/shells /etc/zshenv /etc/nix/nix.custom.conf
          if [[ -z "$NIX_GITHUB_TOKEN" ]]; then
            echo "::error::GitHub token is unavailable"
            exit 1
          fi

          switch_netrc="${RUNNER_TEMP}/nix-switch-netrc"
          {
            printf 'machine api.github.com login x-access-token password %s\n' "$NIX_GITHUB_TOKEN"
            printf 'machine github.com login x-access-token password %s\n' "$NIX_GITHUB_TOKEN"
          } > "$switch_netrc"
          chmod 600 "$switch_netrc"

          # Re-inject cache and GitHub auth since removing nix.custom.conf
          # strips the settings that the actions set up.
          sudo -i env \
            nix \
              --option substituters "$NIX_CACHE_SUBSTITUTERS" \
              --option trusted-public-keys "$NIX_CACHE_TRUSTED_PUBLIC_KEYS" \
              --option netrc-file "$switch_netrc" \
              run \
              ${{ github.workspace }}#darwinConfigurations.gha-${{ matrix.system }}.config.system.build.darwin-rebuild \
              -- switch --flake ${{ github.workspace }}#gha-${{ matrix.system }}
