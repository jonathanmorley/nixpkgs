name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FORMATTER_CLIENT_ID: op://GitHub Actions/Formatter/username
          FORMATTER_PRIVATE_KEY_BASE64: op://GitHub Actions/Formatter/credential
      - name: Decode private key
        id: decode-key
        run: |
          KEY="$(printf '%s' "$FORMATTER_PRIVATE_KEY_BASE64" | tr -d '[:space:]' | base64 -d)"
          echo "::add-mask::$KEY"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "private-key<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$KEY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ env.FORMATTER_CLIENT_ID }}
          private-key: ${{ steps.decode-key.outputs.private-key }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
      - uses: DeterminateSystems/determinate-nix-action@f4c468f2287f0f14a113841b41f2dc8957119519 # v3.19.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Format
        run: nix fmt
      - name: Commit formatting changes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_SLUG="$(gh api /apps --method GET -H 'Accept: application/vnd.github+json' --jq '.slug' 2>/dev/null || echo 'formatter')"
          APP_USER_ID="$(gh api "/users/${APP_SLUG}[bot]" --jq '.id' 2>/dev/null || echo '0')"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: auto-format with treefmt"
          git push

  nix:
    needs: format
    strategy:
      matrix:
        include:
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
      - uses: DeterminateSystems/determinate-nix-action@f4c468f2287f0f14a113841b41f2dc8957119519 # v3.19.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: jonathanmorley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check
        run: nix flake check --print-build-logs --no-update-lock-file
      - name: Switch
        run: |
          # Remove files that will be replaced by nix-darwin
          sudo rm -f /etc/shells /etc/zshenv /etc/nix/nix.custom.conf
          # Re-inject the GitHub token via NIX_CONFIG since removing nix.custom.conf
          # strips the access-tokens that determinate-nix-action configured
          sudo -i env NIX_CONFIG="extra-access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}" nix run nix-darwin -- switch --flake ${{ github.workspace }}#gha-${{ matrix.system }}
