name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FORMATTER_CLIENT_ID: op://GitHub Actions/Formatter/username
          FORMATTER_PRIVATE_KEY_BASE64: op://GitHub Actions/Formatter/credential
      - name: Decode private key
        id: decode-key
        run: |
          private_key=$(printf '%s' "$FORMATTER_PRIVATE_KEY_BASE64" | base64 -d | awk 'BEGIN {ORS="\\n"} {print}' | head -c -2) &> /dev/null
          echo "::add-mask::$private_key"
          echo "private-key=$private_key" >> "$GITHUB_OUTPUT"
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ env.FORMATTER_CLIENT_ID }}
          private-key: ${{ steps.decode-key.outputs.private-key }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
      - uses: DeterminateSystems/determinate-nix-action@7c4cc317e802185875512bfcb68259257279d767 # v3.19.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Format
        run: nix fmt
      - name: Commit formatting changes
        run: git add -A
      - uses: pgaskin/push-signed-commits@00d248c5c952d45cc5ae0dc5b4ca0c236aee25a7 # v1.1.1
        with:
          branch: ${{ github.head_ref }}
          commit-message: "style: auto-format with treefmt"
          github-token: ${{ steps.app-token.outputs.token }}

  nix:
    needs: format
    strategy:
      matrix:
        include:
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
      - uses: DeterminateSystems/determinate-nix-action@7c4cc317e802185875512bfcb68259257279d767 # v3.19.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: jonathanmorley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check
        run: nix flake check --print-build-logs --no-update-lock-file
      - name: Switch
        run: |
          # Remove files that will be replaced by nix-darwin
          sudo rm -f /etc/shells /etc/zshenv /etc/nix/nix.custom.conf
          # Re-inject the GitHub token via NIX_CONFIG since removing nix.custom.conf
          # strips the access-tokens that determinate-nix-action configured
          sudo -i env NIX_CONFIG="extra-access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}" nix run nix-darwin -- switch --flake ${{ github.workspace }}#gha-${{ matrix.system }}
